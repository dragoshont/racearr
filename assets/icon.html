<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
  html, body { margin: 0; padding: 0; background: transparent; }
  #icon { display: block; width: 512px; height: 512px; }
</style>
</head>
<body>
<svg id="icon" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#18212f" />
      <stop offset="1" stop-color="#0b1017" />
    </linearGradient>
    <linearGradient id="arc" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#3b82f6" />
      <stop offset="0.6" stop-color="#22c39a" />
      <stop offset="1" stop-color="#34d399" />
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="116" fill="url(#bg)" />
  <!-- speedometer track -->
  <path d="M 128 292 A 128 128 0 0 1 384 292" fill="none" stroke="#2a3546" stroke-width="36" stroke-linecap="round" />
  <!-- speed (blue -> green, near full) -->
  <path d="M 128 292 A 128 128 0 0 1 376 248" fill="none" stroke="url(#arc)" stroke-width="36" stroke-linecap="round" />
  <!-- needle to the fast end -->
  <line x1="256" y1="292" x2="346" y2="248" stroke="#eafff6" stroke-width="18" stroke-linecap="round" />
  <circle cx="256" cy="292" r="28" fill="#eafff6" />
  <circle cx="256" cy="292" r="13" fill="#0b1017" />
</svg>
</body>
</html>
